<!DOCTYPE html>
<html>
<head>
    <title>3D Robot Map Simulation</title>
    <style> body { margin: 0; background: #111; } canvas { display: block; } </style>
</head>
<body>
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev';
        import { OrbitControls } from 'https://cdn.skypack.dev/examples/jsm/controls/OrbitControls.js';

        // 1. Setup - Scen, Kamera och Renderer
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 10, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Kontroller för att kunna snurra/zooma med musen
        const controls = new OrbitControls(camera, renderer.domElement);

        // 2. Skapa "Point Cloud" - Här sparas alla koordinater
        const maxPoints = 10000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(maxPoints * 3); // x, y, z för varje punkt
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const material = new THREE.PointsMaterial({ color: 0x00ff00, size: 0.1 });
        const points = new THREE.Points(geometry, material);
        scene.add(points);

        let pointIndex = 0;

        // 3. Funktion för att lägga till en ny koordinat (Simulering)
        function addCoordinate(x, y, z) {
            const positions = points.geometry.attributes.position.array;
            
            positions[pointIndex * 3] = x;
            positions[pointIndex * 3 + 1] = y;
            positions[pointIndex * 3 + 2] = z;

            pointIndex = (pointIndex + 1) % maxPoints; // Börja om när listan är full
            points.geometry.attributes.position.needsUpdate = true; // Säg till Three.js att rendera om
        }

        // 4. Loop som simulerar robot-data varje 50ms
        setInterval(() => {
            const time = Date.now() * 0.001;
            const x = Math.sin(time) * 5 + (Math.random() - 0.5);
            const z = Math.cos(time) * 5 + (Math.random() - 0.5);
            const y = Math.random() * 2; // Lite höjdvariation
            addCoordinate(x, y, z);
        }, 50);

        // 5. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
